name: Deploy Astro site

# Builds the Astro site under astro-site/ and deploys it to GitHub Pages via
# the standard Actions flow (upload-pages-artifact + deploy-pages).
# Scoped to astro-site/** so it does not fire on unrelated changes elsewhere
# in the repo (the repo root still has legacy Jekyll files during migration).
#
# NOTE: In the GitHub repo, go to Settings → Pages and set Source to
# "GitHub Actions" (it may currently be "Deploy from a branch").

on:
  push:
    branches:
      - main
    paths:
      - "astro-site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
